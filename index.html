<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ro" />
  <meta name="theme-color" content="#0D1F18" />
  <meta name="description" content="Ro — Ro til at være forældre. Danmarks forældreskabsapp." />
  <title>Ro</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="apple-touch-icon" href="/icon.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D1F18; overflow-x: hidden; }
    #root { min-height: 100vh; }
    /* Remove tap highlight on mobile */
    * { -webkit-tap-highlight-color: transparent; }
    /* Smooth scrolling */
    * { -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Ro App -->
  <script type="text/babel" src="/app.jsx" data-presets="react"></script>

  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
